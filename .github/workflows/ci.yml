name: CI

# Minimal mechanical gate for agent-authored PRs: typecheck (TS7 native),
# lint (eslint via the TS6 API shim), and the unit suite. The heavier
# release machinery (assets:verify, release manifest/attestation, e2e,
# visual regression) stays in the repo's own evidence flow — it is
# environment-pinned (npm 11.17.0 / Node 26) and owner-gated by design.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: npm ci runs third-party lifecycle scripts; nothing here needs write.
permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck (TypeScript 7 native)
        run: npm run typecheck

      - name: Lint
        run: npx eslint .

      - name: Unit tests
        run: npx vitest run

  # Non-blocking Lighthouse report (polish-plan wave 4.4): logs category scores
  # per PR so payload/perf regressions are visible; promote to a blocking budget
  # once targets are agreed.
  lighthouse-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npx vite build

      - name: Lighthouse
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 &
          sleep 3
          # --headless=new + one retry: legacy headless intermittently dies with
          # "Runtime.evaluate: Promise was collected" under Lighthouse.
          for attempt in 1 2; do
            if npx -y lighthouse http://127.0.0.1:4173 --preset=desktop \
              --output=json --output-path=./lighthouse.json \
              --chrome-flags="--headless=new --no-sandbox" --quiet; then
              break
            fi
            if [ "$attempt" = "2" ]; then exit 1; fi
            echo "Lighthouse attempt $attempt failed — retrying"
            sleep 3
          done
          node -e '
            const r = JSON.parse(require("fs").readFileSync("./lighthouse.json", "utf8"));
            for (const [key, cat] of Object.entries(r.categories)) {
              console.log(`${key}: ${Math.round(cat.score * 100)}`);
            }
            const lcp = r.audits["largest-contentful-paint"];
            const cls = r.audits["cumulative-layout-shift"];
            console.log(`LCP: ${lcp.displayValue}  CLS: ${cls.displayValue}`);
          '
