name: CI

# Minimal mechanical gate for agent-authored PRs: typecheck (TS7 native),
# lint (eslint via the TS6 API shim), and the unit suite. The heavier
# release machinery (assets:verify, release manifest/attestation, e2e,
# visual regression) stays in the repo's own evidence flow — it is
# environment-pinned (npm 11.17.0 / Node 26) and owner-gated by design.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck (TypeScript 7 native)
        run: npm run typecheck

      - name: Lint
        run: npx eslint .

      - name: Unit tests
        run: npx vitest run
